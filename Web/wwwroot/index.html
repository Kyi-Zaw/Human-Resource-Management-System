<body class="hold-transition sidebar-mini">
    <script>
        window.showAlert = function (icon, title, message) {
            Swal.fire({
                icon: icon,
                title: title,
                text: message
            });
        }

        window.confirmAction = function (title, message) {
            return Swal.fire({
                title: title,
                text: message,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes, do it!',
                cancelButtonText: 'No, cancel'
            }).then((result) => {
                return result.isConfirmed; // true / false
            });
        }

        //window.initAdminLTE = () => {
        //    if ($('.main-header').length === 0) return;

        //    $('[data-widget="treeview"]').Treeview('init');
        //}

        window.fixAdminLayout = () => {
            if (window.$ && $('body').Layout) {
                $('body').Layout('fix');
            }
        };



        window.initAdminLTE = () => {

            // Treeview (sidebar dropdown)
            //$('[data-widget="treeview"]').Treeview('init');

            // Pushmenu (sidebar toggle)
            $('[data-widget="pushmenu"]').PushMenu();

            $('[data-widget="treeview"]').Treeview('init');

            const fix = () => {
                window.dispatchEvent(new Event('resize'));
            };

            // menu click
            $(document).on('click', '.nav-link', () => {
                setTimeout(fix, 150);
            });

            // sidebar toggle
            $(document).on('click', '[data-widget="pushmenu"]', () => {
                setTimeout(fix, 150);
            });

            // first load
            setTimeout(fix, 300);

        }


        $(document).on('click', '.nav-link', function () {
            setTimeout(function () {
                if ($('body').Layout) {
                    $('body').Layout('fix');
                }
            }, 300);
        });


    </script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">

    </div>
